# 若系统已有主 nginx.conf（如 Debian 默认结构），可只将下面两个 server{ } 块
# 放入 /etc/nginx/sites-available/your-site 后 ln -s 到 sites-enabled，再 nginx -t && systemctl reload nginx
# 仍需：后端 prod、8080、context-path=/api、dist 目录与上面示例一致

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate     /path/to/your.crt.pem;
    ssl_certificate_key /path/to/your.key.pem;

    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    location /api/ {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    location = /api {
        return 301 https://$host/api/;
    }

    location / {
        root /var/www/weblog/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
