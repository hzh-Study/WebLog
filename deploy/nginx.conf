# WeBlog 全站 Nginx 主配置（AcWing 等单机部署用）
# 使用：sudo cp 本文件为 /etc/nginx/nginx.conf 后
#   sudo nginx -t && sudo systemctl reload nginx
# 要求：后端 Spring Boot prod 监听 127.0.0.1:8080，且 application-prod 中 servlet.context-path=/api
# 说明：location /api/ 使用 proxy_pass 无 URI 后缀，将 /api/... 原样转给 Tomcat（须带 /api 与 context-path 一致）

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    gzip on;

    # 避免默认 conf.d / sites 抢 80/443 时，不要放开下面两行
    # include /etc/nginx/conf.d/*.conf;
    # include /etc/nginx/sites-enabled/*;

    # 80 -> 443
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name app6775.acapp.acwing.com.cn;

        return 301 https://$host$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name app6775.acapp.acwing.com.cn;

        ssl_certificate     /etc/nginx/cert/acapp.pem;
        ssl_certificate_key /etc/nginx/cert/acapp.key;

        ssl_session_timeout 5m;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        client_max_body_size 10M;

        location /api/ {
            # 无 URI 路径：上游请求行保持为 /api/...，对应 Spring context-path=/api
            proxy_pass http://127.0.0.1:8080;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
            proxy_buffering off;
        }

        location = /api {
            return 301 https://$host/api/;
        }

        location / {
            root /home/acs/yupao/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
