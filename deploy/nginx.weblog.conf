# WeBlog 生产环境 Nginx 示例（与前端打包 dist + 后端同机部署配套）
# 使用方式（Linux）：
#   1. 将 YOUR_DOMAIN 换成实际域名，调整 ssl 证书路径、root 指向上传后的 dist 目录
#   2. 后端以 prod 启动：SPRING_PROFILES_ACTIVE=prod，监听 8080；application-prod 须含 servlet.context-path=/api
#   3. location /api/ 的 proxy_pass 须为 http://127.0.0.1:8080（无 URI 后缀），原样转发 /api/... 至 Spring
#
# 本地开发仍为 8081、无 context-path，由 Vite 把 /api rewrite 掉，与生产不一致属预期。

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;
    # include /etc/nginx/conf.d/*.conf;
    # include /etc/nginx/sites-enabled/*;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name YOUR_DOMAIN;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name YOUR_DOMAIN;

        ssl_certificate     /path/to/your.crt.pem;
        ssl_certificate_key /path/to/your.key.pem;

        ssl_session_timeout 5m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        client_max_body_size 10M;

        location /api/ {
            proxy_pass http://127.0.0.1:8080;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering off;
        }

        location = /api {
            return 301 https://$host/api/;
        }

        location / {
            root /var/www/weblog/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
