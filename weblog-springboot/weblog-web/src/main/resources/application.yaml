# 本地开发：保持 active=dev（8081、无 /api 前缀、P6Spy SQL 日志，见 application-dev.yaml）
# 打包部署：运行 jar 时加 --spring.profiles.active=prod（见 application-prod：8080、context-path=/api）
# 部署机数据库等可用 Spring 标准环境变量覆盖，例如：SPRING_DATASOURCE_URL、SPRING_DATASOURCE_USERNAME、SPRING_DATASOURCE_PASSWORD
server:
  # 端口号
  port: 8081

spring:
  profiles:
    active: dev
  jackson:
    # 设置后台返参，若字段值为 null, 是否返回
#    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      # 限制上传文件大小
      max-file-size: 10MB
      
jwt:
  # 签发人
  issuer: quanxiaoha
  # 秘钥
  secret: gR6cytlUlgMfVh08nLFZf8hMk4mdJDX5rWBVlsCbKvRlWcLwNRU6+rIPcLx21x191kJgP8udtoZuHt5yUDWtgg==
  # token 过期时间（单位：分钟） 24*60
  tokenExpireTime: 1440
  # token Header 中的 key 值
  tokenHeaderKey: Authorization
  # token Header 中的 value 值前缀
  tokenPrefix: Bearer

  
#=================================================================
# minio (上传图片需要，需配置成自己的地址)
#=================================================================
minio:
  endpoint: https://img.xxx.com
  accessKey: xxx
  secretKey: xxx
  bucketName: xxx

#=================================================================
# AI 功能配置（API Key 仅在后端使用，绝不暴露给前端）
#=================================================================
ai:
  api-key: ${AI_API_KEY:748420c178094a38ae1fb797cc52e7a9.1Hpj7aLDKgd85JiC}
  api-url: ${AI_API_URL:https://open.bigmodel.cn/api/paas/v4/chat/completions}
  model: ${AI_MODEL:glm-4.7-flash}
  max-tokens-per-request: 131072
  max-tokens-per-request-upper: 131072
  daily-article-gen-limit: 20
  interaction-interval-seconds: 60
  daily-token-limit: 500000

#=================================================================
# IP归属地信息库文件路径 ip2region.xdb
#=================================================================
xdb:
  profile: classpath:ip2region_v4.xdb